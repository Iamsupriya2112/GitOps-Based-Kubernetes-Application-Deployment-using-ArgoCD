apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-python-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-python
  template:
    metadata:
      labels:
        app: gitops-python
    spec:
      containers:
      - name: gitops-python
        image: iamsupriya2112/gitops-python-app:v1
        ports:
        - containerPort: 5000