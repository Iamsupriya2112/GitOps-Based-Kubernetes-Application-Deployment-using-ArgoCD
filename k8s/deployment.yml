apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app1
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app1
        image: nginx
        ports:
        - containerPort: 80